# SG-DP3: Semantic-Guided 3D Diffusion Policy Configuration
# ============================================================
# 对齐 DP3 baseline 的关键超参数，保留 SG-DP3 的语义提纯架构

output_dir: outputs/sg_dp3

# ===================== Training =====================
training:
  seed: 42
  num_epochs: 1000           # 1000 epochs
  batch_size: 256             # 对齐 DP3: 256 (原 32)
  lr: 1.0e-4
  lr_min: 1.0e-6
  weight_decay: 1.0e-6
  max_grad_norm: 10.0
  gradient_accumulate_every: 1

  use_ema: true
  # DP3 使用 power schedule EMA: decay = 1 - (1 + step)^(-0.75)
  # 在 train_sg_dp3.py 中实现，这里不再用固定 ema_decay
  ema_power: 0.75             # 对齐 DP3 的 EMA power schedule
  ema_inv_gamma: 1.0          # 对齐 DP3
  ema_min_value: 0.0
  ema_max_value: 0.9999
  ema_update_after_step: 0

  device: cuda
  num_workers: 4

  checkpoint_every: 100       # 每 100 epoch 保存一次
  val_every: 50
  max_train_steps: null
  max_val_steps: null
  resume: false
  debug: false

# ===================== Policy (SG-DP3 Model) =====================
policy:
  shape_meta:
    action:
      shape: [7]          # action_dim: 7-DoF (位置 + 旋转 + 夹爪) - 自动从zarr检测
    obs:
      point_cloud:
        shape: [1024, 3]  # (N_points, 3) XYZ 坐标
      agent_pos:
        shape: [14]       # (D_state,) 机器人本体状态 - 自动从zarr检测

  horizon: 8                # 对齐 DP3: 8 (原 16)
  n_action_steps: 6         # 对齐 DP3: 6 (原 8)
  n_obs_steps: 3            # 对齐 DP3: 3 (原 2)

  # 扩散模型参数
  num_train_timesteps: 100  # 对齐 DP3: 100 (原 1000)
  num_inference_steps: 10   # 对齐 DP3: 10 (原 50)
  beta_schedule: squaredcos_cap_v2
  prediction_type: sample   # 对齐 DP3: sample (原 epsilon)

  # 网络架构
  diffusion_step_embed_dim: 64  # 对齐 DP3 robot_dp3.yaml: 64 (原 256)
  down_dims: [512, 1024, 2048]  # 对齐 DP3: [512,1024,2048] (原 [256,512,1024])
  kernel_size: 5

  # 编码器
  encoder_output_dim: 128   # 对齐 DP3 robot_dp3.yaml: 128 (原 256)
  state_mlp_size: [64, 64]
  pointcloud_encoder_cfg:
    out_channels: 128        # 对齐 encoder_output_dim
    use_layernorm: true
    final_norm: layernorm

  # 语义模块
  semantic_feature_dim: 576  # = obs_feature_dim(192) * n_obs_steps(3), 匹配DP3的global_cond_dim (原128导致4.5:1信息瓶颈)
  use_light_vlm: true           # true=轻量CNN, false=PaliGemma (需要HF认证+约6GB显存)
  vlm_model_name: google/paligemma-3b-mix-224
  use_text_condition: true
  max_token_len: 48

  # 语义提纯
  purification_num_points: 1024  # N_min: 提纯后最少点数
  purification_loss_weight: 0.1

  # 图像
  image_height: 224
  image_width: 224

  # 点云
  use_pc_color: false
  pointnet_type: pointnet

# ===================== Dataset =====================
dataset:
  zarr_path: data/demo_task.zarr
  horizon: 8               # 对齐 policy.horizon
  pad_before: 2             # = n_obs_steps - 1 = 3 - 1
  pad_after: 5              # = n_action_steps - 1 = 6 - 1
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  use_image: true
  instruction: "pick up the block and place it in the basket"
  max_token_len: 48

# ===================== Dataloader =====================
dataloader:
  batch_size: 256            # 对齐 DP3
  shuffle: true
  num_workers: 4
  pin_memory: true
  drop_last: true

val_dataloader:
  batch_size: 64
  shuffle: false
  num_workers: 4
  pin_memory: true
